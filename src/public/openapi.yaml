openapi: 3.0.3
info:
  title: PWA Counter API
  description: API for managing counters and tracking counts in a Progressive Web App.
  version: 1.0.0
servers:
  - url: /api
    description: Local server

components:
  securitySchemes:
    cookieAuth:
      type: http
      scheme: basic
      description: Authentication via session_id cookie.

  schemas:
    User:
      type: object
      properties:
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          example: "john.doe@example.com"

    Counter:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_email:
          type: string
          example: "john.doe@example.com"
        name:
          type: string
          example: "My Counter"
        createtime:
          type: string
          format: date-time
          example: "2023-10-27T10:00:00Z"
        step:
          type: integer
          example: 1
        initial_value:
          type: integer
          description: "Value to set when the counter is reset. Defaults to 0."
          example: 0
        archivetime:
          type: string
          format: date-time
          nullable: true
          example: "2023-10-27T10:00:00Z"
        deletetime:
          type: string
          format: date-time
          nullable: true
          example: null
        type:
          type: string
          enum: [standard, repeating]
          example: "standard"
        frequency:
          type: integer
          description: "Ideal interval between tasks in seconds."
          nullable: true
          example: 1209600
        alert_window:
          type: integer
          description: "Window in seconds before the due date that the task becomes visible."
          nullable: true
          example: 172800
        overdue:
          type: integer
          description: "Duration in seconds from the due date."
          nullable: true
          example: 3600
        last_performed_at:
          type: string
          format: date-time
          nullable: true
          example: "2023-10-27T10:00:00Z"
        priority_score:
          type: number
          description: "Calculated value used to sort repeating tasks by urgency."
          example: 0.0
        repeat_status:
          type: string
          enum: [active, sleeping, n/a]
          description: "Current state of the repeating task."
          example: "n/a"

    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_email:
          type: string
          example: "john.doe@example.com"
        name:
          type: string
          example: "Travel"
        createtime:
          type: string
          format: date-time
          example: "2023-10-27T10:00:00Z"
        deletetime:
          type: string
          format: date-time
          nullable: true
          example: null


    SystemInfo:
      type: object
      properties:
        version:
          type: string
          example: "0.1.0"

    Count:
      type: object
      properties:
        id:
          type: integer
          example: 1
        counter:
          type: integer
          example: 1
        user_email:
          type: string
          example: "john.doe@example.com"
        delta:
          type: integer
          example: 1
        operation:
          type: string
          enum: [count, reset, punt, init]
          description: "Type of operation. 'count' is a normal increment/decrement. 'reset' zeroes the running total. 'punt' defers a repeating task without changing the count. 'init' sets the starting value for a counter or a new cycle after a reset."
          example: "count"
        when:
          type: string
          format: date-time
          example: "2023-10-27T10:00:00Z"
        deletetime:
          type: string
          format: date-time
          nullable: true
          example: null

    APIKey:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        apikey:
          type: string
          example: "key_123456789_rand"
        createtime:
          type: string
          format: date-time
          example: "2023-10-27T10:00:00Z"
        deletetime:
          type: string
          format: date-time
          nullable: true
          example: null
        lastused:
          type: string
          format: date-time
          nullable: true
          example: null

    TagInvite:
      type: object
      properties:
        id:
          type: integer
          example: 1
        tag_id:
          type: integer
          example: 1
        email:
          type: string
          example: "invitee@example.com"
        sender_id:
          type: integer
          example: 1
        access_level:
          type: integer
          example: 2
        status:
          type: string
          example: "pending"
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

security:
  - cookieAuth: []

  /metrics:
    get:
      summary: System Metrics
      description: Returns Prometheus metrics for the system.
      responses:
        '200':
          description: Successful response
          content:
            text/plain:
              schema:
                type: string

  /routes:
    get:
      summary: API Route Discovery
      description: Returns a list of available API routes and their descriptions. Useful for LLM agents to discover the API surface.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    method:
                      type: string
                      example: "GET"
                    path:
                      type: string
                      example: "/api/counters"
                    description:
                      type: string
                      example: "List user counters"
                    auth:
                      type: boolean
                      example: true
        '401':
          description: Unauthorized
  /settings:
    get:
      summary: List user settings
      description: Returns all settings for the authenticated user. If 'key' query param is provided, returns only that setting.
      parameters:
        - name: key
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '401':
          description: Unauthorized
    post:
      summary: Set user setting
      description: Updates or creates a setting for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                setting:
                  type: string
                value:
                  type: string
              required:
                - setting
                - value
      responses:
        '200':
          description: Successfully set the setting
        '400':
          description: Bad request
        '401':
          description: Unauthorized
    delete:
      summary: Delete user setting
      description: Deletes a specific setting for the authenticated user.
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Successfully deleted
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /info:
    get:
      summary: Get system information
      description: Returns information about the backend service, such as the version.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'
        '401':
          description: Unauthorized

  /auth-providers:
    get:
      summary: List available auth providers
      description: Returns the OAuth providers configured on this server. No authentication required.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: "google"
                    name:
                      type: string
                      example: "Google"

  /apikeys:
    get:
      summary: List API keys
      description: Returns all active API keys for the authenticated user.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKey'
        '401':
          description: Unauthorized

  /apikeys/create:
    post:
      summary: Create API key
      description: Generates a new API key for the authenticated user.
      responses:
        '200':
          description: Successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  apikey:
                    type: string
        '401':
          description: Unauthorized

  /apikeys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    delete:
      summary: Delete API key
      description: Soft deletes an API key if the authenticated user owns it.
      responses:
        '200':
          description: Successfully deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /account:
    get:
      summary: Get account information
      description: Returns JSON information of the authenticated user.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
    delete:
      summary: Delete account
      description: Anonymizes the user record and clears the session.
      responses:
        '200':
          description: Successfully deleted
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /account/create:
    post:
      summary: Confirm account creation
      description: Finalizes the account creation process using a temporary token from Google OAuth.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
                - token
      responses:
        '200':
          description: Account successfully created
        '401':
          description: Invalid or expired token
        '500':
          description: Internal server error

  /account/notification-email:
    post:
      summary: Request notification email change
      description: Initiates the process of changing the notification email address by sending a verification link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required:
                - email
      responses:
        '202':
          description: Verification email sent
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /verify-notification-email:
    post:
      summary: Verify notification email
      description: Confirms ownership of the notification email address using a token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
                - token
      responses:
        '200':
          description: Successfully verified
        '400':
          description: Bad request
        '401':
          description: Invalid or expired token
        '500':
          description: Internal server error

  /counts:
    get:
      summary: Get user counts
      description: Returns all count records for counters owned by the authenticated user.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Count'
        '401':
          description: Unauthorized
    post:
      summary: Record a count change
      description: Records a new count delta for a specific counter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                counter:
                  type: integer
                  description: The ID of the counter to update.
                delta:
                  type: integer
                  description: The integer change to record.
                operation:
                  type: string
                  enum: [count, reset, punt, init]
                  description: "Type of operation. Defaults to 'count'. Use 'reset' to zero the running total, 'punt' to defer a repeating task, or 'init' to set a starting value."
                  example: "count"
      responses:
        '200':
          description: Successfully recorded the count change
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Count'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - counter not owned by user
        '404':
          description: Not found - counter does not exist

  /counts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    delete:
      summary: Delete a count record
      description: Soft deletes a count record if the authenticated user owns the associated counter.
      responses:
        '200':
          description: Successfully deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /events:
    get:
      summary: Server-Sent Events stream
      description: >
        Establishes a long-lived SSE connection.
        The server pushes events to the client when updates occur.
      responses:
        '200':
          description: Event stream established
          content:
            text/event-stream:
              schema:
                type: string
                description: A string event message.
        '401':
          description: Unauthorized

  /counters:
    get:
      summary: List user counters
      description: Returns a list of all counters for the authenticated user. Supports filtering by tag.
      parameters:
        - name: tag_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter counters by a specific tag ID.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Counter'
        '401':
          description: Unauthorized
    post:
      summary: Create a new counter
      description: Creates a new counter for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                initial:
                  type: integer
                step:
                  type: integer
                type:
                  type: string
                  enum: [standard, repeating]
                frequency:
                  type: integer
                  description: "Interval in seconds."
                alert_window:
                  type: integer
                  description: "Window in seconds before due date."
              required:
                - name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Counter'
        '401':
          description: Unauthorized
    patch:
      summary: Update a counter
      description: Updates an existing counter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                step:
                  type: integer
                initial_value:
                  type: integer
                  description: "Value to set when the counter is reset. Defaults to 0."
                type:
                  type: string
                  enum: [standard, repeating]
                frequency:
                  type: integer
                alert_window:
                  type: integer
                overdue:
                  type: integer
                  description: "Duration in seconds from the due date."
      responses:
        '200':
          description: Successfully updated
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /counters/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    delete:
      summary: Delete a counter
      description: Soft deletes a counter.
      responses:
        '200':
          description: Successfully deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /tags:
    get:
      summary: List user tags
      description: Returns all tags for the authenticated user.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '401':
          description: Unauthorized
    post:
      summary: Create a tag
      description: Creates a new tag for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
      responses:
        '200':
          description: Successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '401':
          description: Unauthorized

  /tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    put:
      summary: Update a tag
      description: Updates the name of a tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
      responses:
        '200':
          description: Successfully updated
        '401':
          description: Unauthorized
        '404':
          description: Tag not found
    delete:
      summary: Delete a tag
      description: Soft deletes a tag.
      responses:
        '200':
          description: Successfully deleted
        '401':
          description: Unauthorized
        '404':
          description: Tag not found

  /tags/{id}/counters:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: List counters for a tag
      description: Returns a list of counters associated with this tag.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Counter'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /tags/{id}/counters/{cid}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: cid
        in: path
        required: true
        schema:
          type: integer
    post:
      summary: Add tag to counter
      description: Associates a counter with this tag.
      responses:
        '200':
          description: Successfully added
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    delete:
      summary: Remove tag from counter
      description: Dissociates a counter from this tag.
      responses:
        '200':
          description: Successfully removed
        '401':
          description: Unauthorized
        '404':
          description: Association not found

  /tags/{id}/shares:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: List tag shares
      description: Returns a list of emails of users who share this tag.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: \"user@example.com\"
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: Share a tag
      description: Shares this tag with another user. This now initiates an invitation process.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                access_level:
                  type: integer
                  description: Access level (1: Read, 2: Edit).
              required:
                - email
      responses:
        '200':
          description: Invitation successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagInvite'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /tags/{id}/shares/{email}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: email
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Unshare a tag
      description: Removes tag share for the specified email.
      responses:
        '200':
          description: Successfully unshared
        '401':
          description: Unauthorized
        '404':
          description: Share not found

  /tags/{id}/invites:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      summary: Invite a user to share a tag
      description: Creates a sharing invitation for a tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                access_level:
                  type: integer
                  description: Access level (1: Read, 2: Edit).
              required:
                - email
      responses:
        '200':
          description: Invitation successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagInvite'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /tags/{id}/settings:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: List tag settings
      description: Returns all settings for the authenticated user on this tag. If 'key' query param is provided, returns only that setting.
      parameters:
        - name: key
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '401':
          description: Unauthorized
    post:
      summary: Set tag setting
      description: Updates or creates a setting for the authenticated user on this tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                setting:
                  type: string
                value:
                  type: string
              required:
                - setting
                - value
      responses:
        '200':
          description: Successfully set the setting
        '400':
          description: Bad request
        '401':
          description: Unauthorized
    delete:
      summary: Delete tag setting
      description: Deletes a specific setting for the authenticated user on this tag.
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Successfully deleted
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /invites:
    get:
      summary: List received invites
      description: Returns a list of pending tag invitations for the authenticated user.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagInvite'
        '401':
          description: Unauthorized

  /invites/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    delete:
      summary: Retract an invite
      description: Cancels a pending invitation if the authenticated user is the sender.
      responses:
        '200':
          description: Successfully retracted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Invite not found

  /invites/{id}/accept:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      summary: Accept a tag invite
      description: Accepts a tag invitation and grants access to the tag.
      responses:
        '200':
          description: Invitation accepted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /invites/{id}/reject:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      summary: Reject a tag invite
      description: Rejects a tag invitation.
      responses:
        '200':
          description: Invitation rejected successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

