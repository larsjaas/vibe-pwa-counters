<!doctype html>
<html lang="en">
<body style="display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:Arial,sans-serif;background-color: white;">
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <img src="counters-logo.png" alt="Counters" style="margin-bottom: 1rem; max-width: 300px; height: auto;">
  <p style="margin-bottom: 2rem;color: #666;max-width: 400px;line-height: 1.5;">
    A simple web app for counting and keeping track of occurrences of any kind.
  </p>
  <button id="login" style="display:flex;align-items:center;padding:1rem 2rem;font-size:1.2rem;cursor:pointer;border-radius: 8px;border: 1px solid #ccc;background: white;">
    <img src="../svg/lucide/log-in.svg" alt="log in icon" style="width:1.5rem;height:1.5rem;margin-right:0.5rem;vertical-align:middle;" />
    Authenticate
  </button>
  <div style="margin-top: 2rem; font-size: 0.8rem; color: #999; display: flex; flex-direction: column; gap: 0.5rem;">
    <div>
      <a href="/privacy_policy.html" style="color: #999; text-decoration: underline; margin-right: 1rem;">Privacy Policy</a>
      <a href="/terms_of_service.html" style="color: #999; text-decoration: underline;">Terms of Service</a>
    </div>
    <div>
      <a href="https://github.com/larsjaas/vibe-pwa-counters" style="color: #999; text-decoration: underline;">Source Code @ GitHub</a>
    </div>
    <div style="margin-top: 0.5rem;">
      &copy; 2026 Crudbytes
    </div>
  </div>
</div>
<script>
  document.getElementById('login').addEventListener('click', function() {
    window.location.href = '/api/login';
  });
</script>
</body>
</html>
