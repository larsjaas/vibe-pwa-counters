events {
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Proxy API requests to the Go backend
        location /api/ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            proxy_pass http://host.docker.internal:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Public assets
        location = /manifest.json {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            root /usr/share/nginx/html;
        }
        location = /landing_page/index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            root /usr/share/nginx/html;
        }
        location = /favicon.ico {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            root /usr/share/nginx/html;
        }
        location = /icon-192.png {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            root /usr/share/nginx/html;
        }
        location = /icon-512.png {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            root /usr/share/nginx/html;
        }
        location /svg/lucide/ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            root /usr/share/nginx/html;
        }
        location = /openapi.yaml {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            root /usr/share/nginx/html;
        }
        location /swagger-ui/ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            root /usr/share/nginx/html;
        }

        # Serve the static front-end and perform authentication checks
        location / {
            # Disable caching completely
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            auth_request /auth_check;
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # internal route used by auth_request to validate session
        location = /auth_check {
            internal;
            proxy_pass http://host.docker.internal:8081/api/validate-session;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_request_body off;
            proxy_set_header Content-Length 0;
        }

        # Redirect 401 responses from the backend to the OAuth login path
        error_page 401 = @login;

        location @login {
            return 302 $scheme://$http_host/landing_page/index.html;
        }
    }
}
