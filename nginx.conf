events {
}

http {
    server {
        listen 80;

        # Proxy API requests to the Go backend
        location /api/ {
            proxy_pass http://host.docker.internal:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

	location = /landing_page {
            proxy_pass http://host.docker.internal:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
	}

        # Serve the static front-end and perform authentication checks
        location / {
            auth_request /auth_check;
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # internal route used by auth_request to validate session
        location = /auth_check {
            internal;
            proxy_pass http://host.docker.internal:8081/api/validate-session;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_request_body off;
            proxy_set_header Content-Length 0;
        }

        # Redirect 401 responses from the backend to the OAuth login path
        error_page 401 = @login;
        location @login {
            return 302 $scheme://$http_host/landing_page;
        }
    }
}
